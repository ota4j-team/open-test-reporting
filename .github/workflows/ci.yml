name: CI

on:
  push:
    branches:
      - main
  pull_request:
  merge_group:
  schedule:
    - cron: '33 17 * * 0'
  workflow_dispatch:

permissions:
  contents: write
  security-events: write

jobs:
  Build:
    uses: ./.github/workflows/_build.yml
    secrets: inherit
    permissions:
      contents: read
  CodeQL:
    uses: ./.github/workflows/_codeql.yml
    permissions:
      contents: read
      security-events: write
  Publish:
    if: github.event_name == 'push' && github.repository == 'ota4j-team/open-test-reporting'
    needs: [ Build, CodeQL ]
    uses: ./.github/workflows/_publish.yml
    secrets: inherit
    permissions:
      contents: write
  status:
    name: Status
    needs: [ Build, CodeQL, Publish ]
    if: always()
    runs-on: ubuntu-slim
    steps:
      - name: Determine overall status
        env:
          STATUS: ${{ join(needs.*.result, ',') }}
          FAILURE: ${{ contains(join(needs.*.result, ','), 'failure') || contains(join(needs.*.result, ','), 'cancelled') }}
        run: |
          if [ "$FAILURE" = "true" ]; then
            exit 1
          fi
